name: Template Orchestrator

# Cycles through every Template-namespace page (ns=10) and runs every per-page
# op whose NAMESPACES includes 10. Shared state file:
# shinto_miraheze/orchestrators/template_orchestrator.state.

on:
  workflow_dispatch:
    inputs:
      enable_history_offload:
        description: "Archive XML export + make truncation edit"
        type: boolean
        default: false
      enable_revdel:
        description: "Also revision-delete the offloaded history (destructive)"
        type: boolean
        default: false
      enable_interlang_consolidate:
        description: "Fold interlanguage links into the wikidata link template"
        type: boolean
        default: false
      enable_fandom_mirror:
        description: "Mirror full page history to shinto.fandom.com before truncating on miraheze"
        type: boolean
        default: false
      enable_template_usage_check:
        description: "Maintain [[Category:Templates transcluded in mainspace]] / [[Category:Templates not transcluded in mainspace]] on every visited template"
        type: boolean
        default: false
      edit_limit:
        description: "Per-run edit cap (default 100; cleanup-loop bumps to 500 during the 2026-04-23 → 2026-06-01 catch-up window)"
        type: string
        default: "100"
  workflow_call:
    inputs:
      enable_history_offload:
        type: boolean
        default: false
      enable_revdel:
        type: boolean
        default: false
      enable_interlang_consolidate:
        type: boolean
        default: false
      enable_fandom_mirror:
        type: boolean
        default: false
      enable_template_usage_check:
        type: boolean
        default: false
      edit_limit:
        type: string
        default: "100"

permissions:
  contents: write

jobs:
  template-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      WIKI_USERNAME: ${{ vars.WIKI_USERNAME }}
      WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
      WIKI_EDIT_LIMIT: ${{ inputs.edit_limit }}
      ENABLE_HISTORY_OFFLOAD: ${{ inputs.enable_history_offload && '1' || '' }}
      ENABLE_REVDEL: ${{ inputs.enable_revdel && '1' || '' }}
      ENABLE_INTERLANG_CONSOLIDATE: ${{ inputs.enable_interlang_consolidate && '1' || '' }}
      ENABLE_FANDOM_MIRROR: ${{ inputs.enable_fandom_mirror && '1' || '' }}
      ENABLE_TEMPLATE_USAGE_CHECK: ${{ inputs.enable_template_usage_check && '1' || '' }}
      FANDOM_USERNAME: ${{ secrets.FANDOM_USERNAME }}
      FANDOM_PASSWORD: ${{ secrets.FANDOM_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mwclient requests

      - name: Configure SSH for XML archive repo
        env:
          ARCHIVE_REPO_DEPLOY_KEY: ${{ secrets.ARCHIVE_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ARCHIVE_REPO_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Validate required secrets
        run: |
          if [ -z "${WIKI_USERNAME}" ] || [ -z "${WIKI_PASSWORD}" ]; then
            echo "WIKI_USERNAME variable and WIKI_PASSWORD secret are required."
            exit 1
          fi
          if [[ "${WIKI_USERNAME}" != *"@"* ]]; then
            echo "WIKI_USERNAME must use bot-password format, e.g. EmmaBot@EmmaBot."
            exit 1
          fi

      - name: Configure git and run tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          chmod +x shinto_miraheze/commit_state.sh

          RUN_PATH="${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          case "${GITHUB_EVENT_NAME}" in
            push)              CAUSE="commit triggered pipeline" ;;
            schedule)          CAUSE="time triggered pipeline" ;;
            workflow_dispatch) CAUSE="manual triggered pipeline" ;;
            *)                 CAUSE="pipeline run" ;;
          esac
          echo "RUN_TAG=[[github:${RUN_PATH}|${CAUSE}]]" >> "$GITHUB_ENV"

      - name: "Template orchestrator"
        run: |
          python3 -m shinto_miraheze.orchestrators.template_orchestrator \
            --apply --max-edits "$WIKI_EDIT_LIMIT" --run-tag "${RUN_TAG}"

      - name: "Commit state: Template Orchestrator"
        if: always()
        run: shinto_miraheze/commit_state.sh "Template Orchestrator"
