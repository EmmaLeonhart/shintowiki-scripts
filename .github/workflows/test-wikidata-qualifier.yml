name: Wikidata Qualifier Edit

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Apply P459 qualifiers via Wikidata API
        working-directory: modern-quickstatements
        env:
          MW_BOTNAME: ${{ secrets.MW_BOTNAME }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python test_wikidata_qualifier.py
