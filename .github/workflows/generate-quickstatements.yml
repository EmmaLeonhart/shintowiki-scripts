name: Generate QuickStatements

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate QuickStatements files
        working-directory: modern-quickstatements
        run: |
          python generate_p958_qualifiers.py
          python generate_modern_shrine_ranking_qualifiers.py
          python fetch_p11250_from_wiki.py
