name: Generate QuickStatements

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch P11250 from wiki
        working-directory: modern-quickstatements
        run: python fetch_p11250_from_wiki.py

      - name: Generate shrine ranking QS
        working-directory: modern-quickstatements
        continue-on-error: true
        run: python generate_modern_shrine_ranking_qualifiers.py

      - name: Generate P958 QS
        working-directory: modern-quickstatements
        continue-on-error: true
        run: |
          sleep 10
          python generate_p958_qualifiers.py

      - name: Commit generated files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd modern-quickstatements
          # Save generated files before any git operations
          mkdir -p /tmp/qs_backup
          cp *.txt /tmp/qs_backup/ 2>/dev/null || true
          cp -r _site/ /tmp/qs_backup/_site/ 2>/dev/null || true
          # Stage ALL .txt files (including empty ones that replaced old content)
          git add *.txt 2>/dev/null || true
          git add _site/ 2>/dev/null || true
          cd ..
          git diff --cached --quiet && echo "No generated file changes to commit" || {
            # Reset index and working tree, pull latest, then re-apply generated files
            git reset HEAD -- . || true
            git checkout -- . || true
            git clean -fd modern-quickstatements/ || true
            git pull --rebase || true
            cp /tmp/qs_backup/*.txt modern-quickstatements/ 2>/dev/null || true
            cp -r /tmp/qs_backup/_site/* modern-quickstatements/_site/ 2>/dev/null || true
            cd modern-quickstatements
            git add *.txt 2>/dev/null || true
            git add _site/ 2>/dev/null || true
            cd ..
            git diff --cached --quiet && echo "No changes after rebase" || {
              git commit -m "chore(qs): update generated QuickStatements files [skip ci]"
              # Retry push once after pulling if it gets rejected again
              git push || { git pull --rebase && git push; }
            }
          }

      - name: Upload generated QS files
        uses: actions/upload-artifact@v4
        with:
          name: quickstatements-files
          path: modern-quickstatements/*.txt
          retention-days: 1

      - name: Upload generated QS site
        uses: actions/upload-artifact@v4
        with:
          name: quickstatements-site
          path: modern-quickstatements/_site/
          retention-days: 1
