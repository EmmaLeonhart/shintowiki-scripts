name: Submit Batch

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Regenerate QuickStatements files
        run: |
          python generate_modern_shrine_ranking_qualifiers.py
          python generate_p958_qualifiers.py

      - name: Submit daily batch via QuickStatements API
        env:
          QUICKSTATEMENTS_API_KEY: ${{ secrets.QUICKSTATEMENTS_API_KEY }}
          QUICKSTATEMENTS_USERNAME: ${{ secrets.QUICKSTATEMENTS_USERNAME }}
        run: python submit_daily_batch.py

      - name: Commit and push run report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Daily submission report $(date -u +%Y-%m-%d)"
          git push
