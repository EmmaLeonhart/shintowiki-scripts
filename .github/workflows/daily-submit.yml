name: Daily Chain

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 21 * * *'  # Daily at 21:00 UTC (1:00 PM PST)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    uses: ./.github/workflows/generate-and-deploy.yml
    permissions:
      contents: write
      pages: write
      id-token: write

  wait:
    needs: generate
    uses: ./.github/workflows/random-wait.yml

  submit:
    needs: wait
    uses: ./.github/workflows/submit-batch.yml
    permissions:
      contents: write
    secrets: inherit
