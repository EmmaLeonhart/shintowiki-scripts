name: Legacy Wiki Cleanup

# Legacy Wiki Cleanup
# ===================
# Stateless tasks + "terminating" stateful scripts — scripts whose state file
# grows to cover every eligible page once, after which the script exits each
# run with nothing to do.
#
# Cycling per-page operations (state file resets at the end of every sweep)
# have been migrated into three namespace orchestrators:
#   - mainspace-orchestrator.yml  (ns 0)
#   - category-orchestrator.yml   (ns 14)
#   - template-orchestrator.yml   (ns 10)
#
# Each orchestrator owns a single shared state file for its namespace and
# runs every registered per-page op in one visit, replacing the prior model
# of 11 separate state files.
#
# Terminating scripts kept here (review July 2026 — see todo.md):
#   - reimport_from_enwiki.py        (input-file driven, already done per state)
#   - migrate_talk_pages.py          (talk-page rebuild, all subject namespaces)
#   - normalize_category_pages.py    (Category ns, weekly)
#   - remove_legacy_cat_templates.py (Category ns, monthly)
#
# When a terminating script's state shows it has processed every eligible
# page AND the script stops producing edits across multiple runs, remove its
# step from this workflow and delete the script from the repo.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      WIKI_USERNAME: ${{ vars.WIKI_USERNAME }}
      WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
      WIKI_EDIT_LIMIT: "100"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mwclient requests

      - name: Validate required secrets
        run: |
          if [ -z "${WIKI_USERNAME}" ] || [ -z "${WIKI_PASSWORD}" ]; then
            echo "WIKI_USERNAME variable and WIKI_PASSWORD secret are required."
            exit 1
          fi
          if [[ "${WIKI_USERNAME}" != *"@"* ]]; then
            echo "WIKI_USERNAME must use bot-password format, e.g. EmmaBot@EmmaBot."
            exit 1
          fi

      - name: Configure git and environment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          chmod +x shinto_miraheze/run_step.sh shinto_miraheze/commit_state.sh

          # Build RUN_TAG
          RUN_PATH="${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          case "${GITHUB_EVENT_NAME}" in
            push)              CAUSE="commit triggered pipeline" ;;
            schedule)          CAUSE="time triggered pipeline" ;;
            workflow_dispatch) CAUSE="manual triggered pipeline" ;;
            *)                 CAUSE="pipeline run" ;;
          esac
          echo "RUN_TAG=[[github:${RUN_PATH}|${CAUSE}]]" >> "$GITHUB_ENV"

      # ════════════════════════════════════════
      #  Bookkeeping: START
      # ════════════════════════════════════════

      - name: "Bookkeeping: mark active"
        run: |
          python3 shinto_miraheze/update_bot_userpage_status.py \
            --run-tag "${RUN_TAG}" --status active --stage "Bookkeeping: START"

      # ════════════════════════════════════════
      #  Chunk 1: Import & Categorization
