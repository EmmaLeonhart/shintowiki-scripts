name: Miscellaneous Orchestrator

# Cycles through every wikitext namespace that isn't already owned by the
# three main orchestrators (mainspace, template, category). Runs every
# per-page op whose NAMESPACES includes the current namespace, using one
# state file per namespace (misc_orchestrator_<ns>.state). The --max-edits
# budget is shared across the entire miscellaneous sweep.

on:
  workflow_dispatch:
    inputs:
      enable_history_offload:
        description: "Archive XML export + make truncation edit"
        type: boolean
        default: false
      enable_revdel:
        description: "Also revision-delete the offloaded history"
        type: boolean
        default: false
      enable_interlang_consolidate:
        description: "Fold interlanguage links into the wikidata link template"
        type: boolean
        default: false
      enable_fandom_mirror:
        description: "Mirror full page history to shinto.fandom.com before truncating on miraheze"
        type: boolean
        default: false
  workflow_call:
    inputs:
      enable_history_offload:
        type: boolean
        default: false
      enable_revdel:
        type: boolean
        default: false
      enable_interlang_consolidate:
        type: boolean
        default: false
      enable_fandom_mirror:
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  miscellaneous-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      WIKI_USERNAME: ${{ vars.WIKI_USERNAME }}
      WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
      WIKI_EDIT_LIMIT: "100"
      ENABLE_HISTORY_OFFLOAD: ${{ inputs.enable_history_offload && '1' || '' }}
      ENABLE_REVDEL: ${{ inputs.enable_revdel && '1' || '' }}
      ENABLE_INTERLANG_CONSOLIDATE: ${{ inputs.enable_interlang_consolidate && '1' || '' }}
      ENABLE_FANDOM_MIRROR: ${{ inputs.enable_fandom_mirror && '1' || '' }}
      FANDOM_USERNAME: ${{ secrets.FANDOM_USERNAME }}
      FANDOM_PASSWORD: ${{ secrets.FANDOM_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mwclient requests

      - name: Configure SSH for XML archive repo
        env:
          ARCHIVE_REPO_DEPLOY_KEY: ${{ secrets.ARCHIVE_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ARCHIVE_REPO_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Validate required secrets
        run: |
          if [ -z "${WIKI_USERNAME}" ] || [ -z "${WIKI_PASSWORD}" ]; then
            echo "WIKI_USERNAME variable and WIKI_PASSWORD secret are required."
            exit 1
          fi
          if [[ "${WIKI_USERNAME}" != *"@"* ]]; then
            echo "WIKI_USERNAME must use bot-password format, e.g. EmmaBot@EmmaBot."
            exit 1
          fi

      - name: Configure git and run tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          chmod +x shinto_miraheze/commit_state.sh

          RUN_PATH="${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          case "${GITHUB_EVENT_NAME}" in
            push)              CAUSE="commit triggered pipeline" ;;
            schedule)          CAUSE="time triggered pipeline" ;;
            workflow_dispatch) CAUSE="manual triggered pipeline" ;;
            *)                 CAUSE="pipeline run" ;;
          esac
          echo "RUN_TAG=[[github:${RUN_PATH}|${CAUSE}]]" >> "$GITHUB_ENV"

      - name: "Miscellaneous orchestrator"
        run: |
          python3 -m shinto_miraheze.orchestrators.miscellaneous_orchestrator \
            --apply --max-edits "$WIKI_EDIT_LIMIT" --run-tag "${RUN_TAG}"

      # Render the duplicate-QIDs wiki report from the shared dict that
      # the `duplicate_qids` op populates across all four orchestrators.
      # Must run after ALL orchestrators (this is the last one) so the
      # dict reflects the whole wiki, not just one namespace.
      - name: "Render: find_duplicate_page_qids"
        if: always()
        run: |
          shinto_miraheze/run_step.sh "Render: find_duplicate_page_qids" \
            python3 shinto_miraheze/find_duplicate_page_qids.py --apply --run-tag "${RUN_TAG}"

      - name: "Commit state: Miscellaneous Orchestrator"
        if: always()
        run: shinto_miraheze/commit_state.sh "Miscellaneous Orchestrator"
