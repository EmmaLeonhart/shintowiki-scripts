name: Submit QuickStatements

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      qs-failed:
        description: "Whether QuickStatements submission failed"
        value: ${{ jobs.submit.outputs.qs-failed }}

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      qs-failed: ${{ steps.qs-submit.outcome == 'failure' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Download generated QS files
        uses: actions/download-artifact@v4
        with:
          name: quickstatements-files
          path: modern-quickstatements
        continue-on-error: true

      - name: Submit daily batch via QuickStatements API
        id: qs-submit
        continue-on-error: true
        working-directory: modern-quickstatements
        env:
          QS_TOKEN: ${{ secrets.QS_TOKEN }}
          QS_USERNAME: ${{ secrets.QS_USERNAME }}
        run: python submit_daily_batch.py

      - name: Commit and push run report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modern-quickstatements/reports/
          git diff --cached --quiet || git commit -m "Daily QS submission report $(date -u +%Y-%m-%d) [skip ci]"
          git stash --include-untracked || true
          git pull --rebase || true
          git stash pop || true
          git push

      - name: Fail job if submission failed
        if: steps.qs-submit.outcome == 'failure'
        run: |
          echo "::warning::QuickStatements API submission failed — this is expected behavior. The QS API frequently returns errors or timeouts. The report has been committed above. No action needed."
          exit 1
