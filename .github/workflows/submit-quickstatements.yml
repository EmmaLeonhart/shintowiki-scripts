name: Submit QuickStatements

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Regenerate QuickStatements files
        working-directory: modern-quickstatements
        run: |
          python generate_modern_shrine_ranking_qualifiers.py
          sleep 10
          python generate_p958_qualifiers.py
          python fetch_p11250_from_wiki.py

      - name: Submit daily batch via QuickStatements API
        working-directory: modern-quickstatements
        env:
          QS_TOKEN: ${{ secrets.QS_TOKEN }}
          QS_USERNAME: ${{ secrets.QS_USERNAME }}
        run: python submit_daily_batch.py

      - name: Commit and push run report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modern-quickstatements/reports/
          git diff --cached --quiet || git commit -m "Daily QS submission report $(date -u +%Y-%m-%d) [skip ci]"
          git stash --include-untracked || true
          git pull --rebase || true
          git stash pop || true
          git push
