name: Build Run History

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull latest (reports may have been pushed by prior job)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true

      - name: Generate run history page
        working-directory: modern-quickstatements
        run: python generate_run_history.py

      - name: Commit and push run history
        run: |
          git add modern-quickstatements/_site/runs.html
          git diff --cached --quiet || git commit -m "chore: update run history page [skip ci]"
          git stash --include-untracked || true
          git pull --rebase || true
          git stash pop || true
          git push
