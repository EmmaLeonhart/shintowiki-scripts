name: shinto-cleanup-loop

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "**/*.state"
      - "**/*.log"
      - "**/*.errors"
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: shinto-cleanup-loop
  cancel-in-progress: false

jobs:
  generate-quickstatements:
    uses: ./.github/workflows/generate-quickstatements.yml

  cleanup:
    needs: generate-quickstatements
    if: always()
    uses: ./.github/workflows/wiki-cleanup.yml
    secrets: inherit

  # Random delay only on cron schedule, not on push
  random-wait:
    needs: cleanup
    if: github.event_name == 'schedule'
    uses: ./.github/workflows/random-wait.yml

  # On push: submit immediately after cleanup
  # On cron: submit after random wait
  submit-quickstatements:
    needs: [cleanup, random-wait]
    if: always() && needs.cleanup.result == 'success'
    uses: ./.github/workflows/submit-quickstatements.yml
    secrets: inherit
