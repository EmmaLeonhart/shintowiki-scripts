name: shinto-cleanup-loop

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "**/*.state"
      - "**/*.log"
      - "**/*.errors"
  schedule:
    # Every 6 hours. Until 2026-06-01 every fire runs the full pipeline
    # (catch-up cadence). After 2026-06-01 the window-gate job skips
    # every downstream job except on the 00:00 UTC fire — so the
    # effective cadence returns to daily automatically with no manual
    # cron change needed. See window-gate's `should-proceed` output.
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: shinto-cleanup-loop
  # Was `false` historically so long orchestrator runs finished cleanly.
  # Flipped to `true` on 2026-04-24 after a cleanup job hung for hours
  # on audit_double_category_qids and manual `gh run cancel` didn't
  # propagate. With this on, any new push / schedule fires will cancel
  # the prior stuck run instead of queueing behind it.
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════
  # TEMPORARY (2026-04-23 → 2026-06-01): catch-up window.
  # Due to potential concerns about the future of shintowiki, we are
  # temporarily (a) skipping the non-orchestrator wiki-cleanup step,
  # SPARQL QS generation, and QS/Wikidata submission; and (b) raising
  # the per-run edit budget on the four namespace orchestrators from
  # 100 to 500. The window-gate job below outputs `catchup-active` so
  # every affected downstream job can key off one value. Remove this
  # gate (and restore the default edit limit) on/after 2026-06-01.
  # ══════════════════════════════════════════════════════════
  window-gate:
    runs-on: ubuntu-latest
    outputs:
      catchup-active: ${{ steps.check.outputs.active }}
      should-proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          # (1) Is the catch-up window still open?
          if [ "$(date -u +%Y%m%d)" -lt "20260601" ]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "Catch-up window ACTIVE (pre-2026-06-01): QS/cleanup jobs skipped, orchestrator budget raised to 500."
            CATCHUP=true
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Catch-up window EXPIRED: normal schedule."
            CATCHUP=false
          fi

          # (2) Should this fire actually run the pipeline?
          #   - push / workflow_dispatch: always run
          #   - schedule + catch-up active: run every 6h fire (catch-up cadence)
          #   - schedule + catch-up expired: only the 00:00 UTC fire runs
          #     (daily cadence, matching pre-catchup behaviour)
          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Non-schedule event ($GITHUB_EVENT_NAME): proceeding."
          elif [ "$CATCHUP" = "true" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Catch-up active: every 6h scheduled fire proceeds."
          elif [ "$(date -u +%H)" = "00" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "00:00 UTC scheduled fire (post-catchup daily slot): proceeding."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Off-hour scheduled fire (post-catchup): window-gate only, downstream will skip."
          fi

  generate-quickstatements:
    needs: window-gate
    if: needs.window-gate.outputs.should-proceed == 'true' && needs.window-gate.outputs.catchup-active != 'true'
    uses: ./.github/workflows/generate-quickstatements.yml

  # Build pages right after SPARQL generation (runs in parallel with cleanup)
  generate-pages:
    needs: [window-gate, generate-quickstatements]
    if: always() && needs.window-gate.outputs.should-proceed == 'true'
    uses: ./.github/workflows/generate-pages.yml

  cleanup:
    needs: [window-gate, generate-quickstatements]
    if: always() && needs.window-gate.outputs.should-proceed == 'true' && needs.window-gate.outputs.catchup-active != 'true'
    uses: ./.github/workflows/wiki-cleanup.yml
    secrets: inherit

  # sync_git_synced_pages runs on every pipeline regardless of the
  # catch-up window — individual date gating, so the git_synced/ ↔ wiki
  # mirror keeps moving even while the broader legacy cleanup is paused.
  git-synced-sync:
    needs: window-gate
    if: always() && needs.window-gate.outputs.should-proceed == 'true'
    uses: ./.github/workflows/git-synced-sync.yml
    secrets: inherit

  # Per-namespace orchestrators — each runs every per-page op whose
  # NAMESPACES includes its namespace, using a single shared state file
  # per namespace. Replaces the per-script state files of the cycling
  # scripts that used to live in wiki-cleanup.yml.
  # Template:Wikidata link has been updated (via git_synced/) to accept
  # the new positional |lang|title pairs (up to 20 pairs, params 2-41),
  # so enable_interlang_consolidate is now on for all four orchestrators.

  mainspace-orchestrator:
    needs: [window-gate, cleanup]
    if: always() && needs.window-gate.outputs.should-proceed == 'true'
    uses: ./.github/workflows/mainspace-orchestrator.yml
    with:
      enable_history_offload: true
      enable_revdel: true
      enable_fandom_mirror: true
      enable_interlang_consolidate: true
      edit_limit: ${{ needs.window-gate.outputs.catchup-active == 'true' && '500' || '100' }}
    secrets: inherit

  category-orchestrator:
    needs: [window-gate, mainspace-orchestrator]
    if: always() && needs.window-gate.outputs.should-proceed == 'true'
    uses: ./.github/workflows/category-orchestrator.yml
    with:
      enable_history_offload: true
      enable_revdel: true
      enable_fandom_mirror: true
      enable_interlang_consolidate: true
      edit_limit: ${{ needs.window-gate.outputs.catchup-active == 'true' && '500' || '100' }}
    secrets: inherit

  template-orchestrator:
    needs: [window-gate, category-orchestrator]
    if: always() && needs.window-gate.outputs.should-proceed == 'true'
    uses: ./.github/workflows/template-orchestrator.yml
    with:
      enable_history_offload: true
      enable_revdel: true
      enable_fandom_mirror: true
      enable_interlang_consolidate: true
      edit_limit: ${{ needs.window-gate.outputs.catchup-active == 'true' && '500' || '100' }}
    secrets: inherit

  # Sweeps every other wikitext namespace (User, Talk, Project, File,
  # MediaWiki, Help, and all remaining Talk spaces) with one shared
  # edit budget. Runs last among the orchestrators.
  miscellaneous-orchestrator:
    needs: [window-gate, template-orchestrator]
    if: always() && needs.window-gate.outputs.should-proceed == 'true'
    uses: ./.github/workflows/miscellaneous-orchestrator.yml
    with:
      enable_history_offload: true
      enable_revdel: true
      enable_fandom_mirror: true
      enable_interlang_consolidate: true
      edit_limit: ${{ needs.window-gate.outputs.catchup-active == 'true' && '500' || '100' }}
    secrets: inherit

  # Random delay only on cron schedule, not on push.
  # Skipped during the catch-up window (per 2026-04-23 pause).
  random-wait:
    needs: [window-gate, miscellaneous-orchestrator]
    if: github.event_name == 'schedule' && needs.window-gate.outputs.should-proceed == 'true' && needs.window-gate.outputs.catchup-active != 'true'
    uses: ./.github/workflows/random-wait.yml

  # On push: submit immediately after orchestrators
  # On cron: submit after random wait
  # Skipped during the catch-up window.
  submit-quickstatements:
    needs: [window-gate, miscellaneous-orchestrator, random-wait]
    if: always() && needs.window-gate.outputs.should-proceed == 'true' && needs.cleanup.result == 'success' && needs.window-gate.outputs.catchup-active != 'true'
    uses: ./.github/workflows/submit-quickstatements.yml
    secrets: inherit

  # Direct Wikidata edits via API (after QS submission)
  # Skipped during the catch-up window.
  wikidata-qualifier-edit:
    needs: [window-gate, cleanup, submit-quickstatements]
    if: always() && needs.window-gate.outputs.should-proceed == 'true' && needs.cleanup.result == 'success' && needs.window-gate.outputs.catchup-active != 'true'
    uses: ./.github/workflows/test-wikidata-qualifier.yml
    secrets: inherit

  # Final action: rebuild run history page from all reports
  build-run-history:
    needs: [window-gate, submit-quickstatements, wikidata-qualifier-edit]
    if: always() && needs.window-gate.outputs.should-proceed == 'true'
    uses: ./.github/workflows/build-run-history.yml

  # Fallback: if QS submission failed, apply edits directly via Wikidata API
  # This is the absolute last step — random 1-5 min intervals, no rush
  direct-daily-edits:
    needs: [window-gate, submit-quickstatements, build-run-history]
    if: always() && needs.window-gate.outputs.should-proceed == 'true' && needs.submit-quickstatements.outputs.qs-failed == 'true'
    uses: ./.github/workflows/direct-daily-edits.yml
    secrets: inherit

