name: shinto-cleanup-loop

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "**/*.state"
      - "**/*.log"
      - "**/*.errors"
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: shinto-cleanup-loop
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      WIKI_USERNAME: ${{ vars.WIKI_USERNAME }}
      WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
      WIKI_EDIT_LIMIT: "100"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mwclient requests

      - name: Validate required secrets
        run: |
          if [ -z "${WIKI_USERNAME}" ] || [ -z "${WIKI_PASSWORD}" ]; then
            echo "WIKI_USERNAME variable and WIKI_PASSWORD secret are required."
            exit 1
          fi
          if [[ "${WIKI_USERNAME}" != *"@"* ]]; then
            echo "WIKI_USERNAME must use bot-password format, e.g. EmmaBot@EmmaBot."
            exit 1
          fi

      - name: Configure git for state commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run cleanup loop
        run: |
          chmod +x shinto_miraheze/cleanup_loop.sh
          shinto_miraheze/cleanup_loop.sh

      - name: Push state commits
        if: always()
        run: |
          # Fallback: commit any remaining uncommitted state files
          find . -name '*.state' -o -name '*.log' -o -name '*.errors' | xargs -r git add -f
          if ! git diff --cached --quiet; then
            git commit -m "chore(state): update bot state files (fallback) [skip ci]"
          fi
          # Push all state commits (from chunks + fallback) in one go
          if [ "$(git rev-list --count origin/${GITHUB_REF_NAME}..HEAD)" -gt 0 ]; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "No new commits to push."
          fi
